global
    log stdout format raw local0
    maxconn 4096

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000ms
    timeout client  50000ms
    timeout server  50000ms

frontend http_front
    bind *:80
    
    acl is_api path_beg /api
    acl is_admin path_beg /admin
    acl is_uploads path_beg /uploads
    
    use_backend strapi_back if is_api
    use_backend strapi_back if is_admin
    use_backend strapi_back if is_uploads
    
    default_backend astro_back

backend astro_back
    balance roundrobin
    option httpchk GET / HTTP/1.1\r\nHost:\ localhost
    server astro1 astro:3000 check inter 5s fall 3 rise 2
    server astro2 astro:3000 check inter 5s fall 3 rise 2

backend strapi_back
    balance roundrobin
    option httpchk GET / HTTP/1.1\r\nHost:\ localhost
    server strapi1 strapi:1337 check inter 10s fall 3 rise 2
    server strapi2 strapi:1337 check inter 10s fall 3 rise 2

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats auth admin:admin123
